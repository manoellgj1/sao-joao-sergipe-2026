<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>São João de Sergipe 2026</title>
  <!-- Umami Web Analytics (grátis, cookieless, sem banner LGPD) -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="4f63a975-5f52-42a1-a7cf-f079820ad4d6"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN TOKENS ─────────────────────────────────────── */
    :root {
      --bg:          #FFF8F0;
      --dark:        #1C0A00;
      --card:        #FFFFFF;
      --primary:     #EA580C;
      --primary-dim: rgba(234,88,12,.12);
      --secondary:   #F59E0B;
      --accent:      #B91C1C;
      --green:       #15803D;
      --muted-bg:    #FEF3C7;
      --muted-fg:    #92400E;
      --border:      #FED7AA;
      --text:        #1C0A00;
      --radius:      1rem;
      --header-h:    56px;
      --band-h:      22px;
      --bottom-h:    64px;
      --shadow-warm: 0 2px 16px rgba(234,88,12,.10);
      --shadow-card: 0 1px 4px rgba(28,10,0,.07), 0 4px 16px rgba(28,10,0,.06);
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: var(--bottom-h);
      -webkit-font-smoothing: antialiased;
    }
    @media (min-width: 768px) { body { padding-bottom: 0; } }
    h1,h2,h3,h4,h5 { font-family: 'Baloo 2', cursive; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; border: none; background: none; }
    img { max-width: 100%; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; } }

    /* ── REALIZAÇÃO / PATROCÍNIO ────────────────────────────── */
    .realizacao-section {
      margin-top: 1.5rem;
      padding: 2.25rem 0 3rem;
      border-top: 1px solid var(--border);
      background: var(--card);
    }
    .realizacao-section .container { text-align: center; }
    .realizacao-label {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-fg);
      margin-bottom: 1.1rem;
    }
    .realizacao-logo {
      display: inline-block;
      transition: transform .2s ease, opacity .2s ease;
    }
    .realizacao-logo:hover { transform: translateY(-2px); opacity: .85; }
    .realizacao-logo img {
      width: 260px;
      max-width: 70vw;
      height: auto;
      display: block;
    }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 1rem; }

    /* ── HEADER ─────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--dark);
    }
    .bandeirinhas-strip { height: var(--band-h); overflow: hidden; line-height: 0; }
    .bandeirinhas-strip svg { display: block; }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: var(--header-h); padding: 0 1rem; gap: 0.75rem;
    }
    .logo-area { display: flex; align-items: center; gap: 0.625rem; min-width: 0; }
    .logo-area img { height: 44px; width: auto; cursor: pointer; }
    .logo-fallback {
      display: none; font-family: 'Baloo 2', cursive; font-weight: 900;
      font-size: 1rem; color: var(--secondary); letter-spacing: -0.02em;
      cursor: pointer; white-space: nowrap;
    }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }
    .realizado-por {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.2rem 0.5rem; border-radius: 0.5rem;
      transition: background .2s, opacity .2s;
    }
    .realizado-por:hover { background: rgba(255,255,255,.10); opacity: .9; }
    .realizado-por:focus-visible { outline: 2px solid var(--secondary); outline-offset: 2px; }
    .realizado-por-label {
      font-family: 'Nunito', sans-serif; font-weight: 700;
      font-size: 0.6rem; line-height: 1.1; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(255,255,255,.55);
      white-space: nowrap;
    }
    .realizado-por img { height: 26px; width: auto; display: block; }
    @media (max-width: 480px) {
      .realizado-por-label { display: none; }
      .realizado-por img { height: 22px; }
      .realizado-por { padding: 0.2rem 0.35rem; }
    }
    .hbtn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 0.625rem;
      color: rgba(255,255,255,.75); transition: background .2s, color .2s;
      background: transparent; cursor: pointer;
    }
    .hbtn:hover, .hbtn.active { background: rgba(255,255,255,.12); color: #fff; }
    .hbtn:focus-visible { outline: 2px solid var(--secondary); outline-offset: 2px; }

    /* ── BOTTOM NAV ─────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      height: var(--bottom-h);
      background: var(--dark);
      display: flex; align-items: stretch;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    @media (min-width: 768px) { .bottom-nav { display: none; } }
    .bnav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; cursor: pointer;
      color: rgba(255,255,255,.45); transition: color .2s, background .2s;
      position: relative; padding: 0 4px;
    }
    .bnav-item:hover { color: rgba(255,255,255,.75); }
    .bnav-item.active { color: var(--secondary); }
    .bnav-item.active::after {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 32px; height: 2px; background: var(--secondary); border-radius: 0 0 2px 2px;
    }
    .bnav-label { font-size: 0.6rem; font-weight: 800; letter-spacing: .02em; text-transform: uppercase; }
    .bnav-badge {
      position: absolute; top: 8px; right: calc(50% - 12px);
      background: var(--accent); color: white;
      font-size: .55rem; font-weight: 900; line-height: 1;
      min-width: 14px; height: 14px; padding: 0 3px;
      border-radius: 99px; display: flex; align-items: center; justify-content: center;
    }

    /* ── SEARCH OVERLAY ─────────────────────────────────────── */
    .search-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(28,10,0,.85); backdrop-filter: blur(4px);
      display: none; flex-direction: column;
    }
    .search-overlay.open { display: flex; }
    .search-overlay-bar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--dark); border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .search-overlay-input {
      flex: 1; background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 0.75rem; padding: 0.625rem 1rem;
      color: white; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600;
      outline: none;
    }
    .search-overlay-input::placeholder { color: rgba(255,255,255,.4); }
    .search-overlay-input:focus { border-color: var(--secondary); }
    .search-close { color: rgba(255,255,255,.6); font-size: 0.875rem; font-weight: 800; white-space: nowrap; cursor: pointer; padding: 0.5rem; }
    .search-results {
      flex: 1; overflow-y: auto; padding: 1rem;
    }
    .search-section-title { font-family: 'Baloo 2', cursive; font-size: 0.75rem; font-weight: 800; color: rgba(255,255,255,.4); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 0.5rem; margin-top: 1rem; }
    .search-section-title:first-child { margin-top: 0; }
    .search-tag {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      color: white; padding: 0.375rem 0.875rem; border-radius: 9999px;
      font-size: 0.8rem; font-weight: 700; margin: 0.25rem 0.25rem 0.25rem 0;
      cursor: pointer; transition: background .15s;
    }
    .search-tag:hover { background: rgba(255,255,255,.18); }
    .search-event-card {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 0.75rem; padding: 0.875rem 1rem; margin-bottom: 0.5rem;
      cursor: pointer; transition: background .15s;
    }
    .search-event-card:hover { background: rgba(255,255,255,.12); }
    .search-event-name { font-family: 'Baloo 2', cursive; font-weight: 800; color: white; font-size: 0.9rem; }
    .search-event-meta { font-size: 0.75rem; color: rgba(255,255,255,.5); margin-top: 3px; }
    .search-empty { text-align: center; color: rgba(255,255,255,.4); padding: 3rem 0; font-size: 0.875rem; }
    .search-placeholder { text-align: center; padding: 3rem 0; color: rgba(255,255,255,.3); }
    .search-placeholder svg { margin: 0 auto 0.75rem; opacity: .4; }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero { position: relative; overflow: hidden; background: var(--dark); }
    .hero-img { width: 100%; height: clamp(220px, 40vw, 420px); object-fit: cover; object-position: center top; display: block; opacity: .85; }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,10,0,1) 0%, rgba(28,10,0,.5) 50%, rgba(28,10,0,.15) 100%);
      pointer-events: none;
    }
    .hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.5rem 1rem 1.25rem;
    }
    .hero-eyebrow {
      font-size: 0.7rem; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: var(--secondary); margin-bottom: 0.25rem;
    }
    .hero-title {
      font-family: 'Baloo 2', cursive; font-weight: 900;
      font-size: clamp(1.5rem, 5vw, 2.5rem); color: white; line-height: 1.1;
      margin-bottom: 0.625rem;
    }
    .hero-date-badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: var(--primary); color: white;
      padding: 0.25rem 0.75rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 800;
    }

    /* ── FILTER STRIP (HOME) ────────────────────────────────── */
    .filter-strip {
      position: sticky; top: calc(var(--header-h) + var(--band-h)); z-index: 40;
      background: rgba(255,248,240,.97); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.625rem 0;
    }
    .filter-inner { display: flex; gap: 0.5rem; align-items: center; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .filter-inner::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
      padding: 0.4rem 0.875rem; border-radius: 9999px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 0.75rem; font-weight: 800; white-space: nowrap;
      color: var(--text); cursor: pointer; transition: all .2s; flex-shrink: 0;
      min-width: 152px;
    }
    .chip:hover { border-color: var(--primary); }
    .chip:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .chip.on { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
    .chip-x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 9999px;
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--muted-fg); cursor: pointer; transition: all .2s; flex-shrink: 0;
    }
    .chip-x:hover { border-color: var(--accent); color: var(--accent); }
    .filter-count { margin-left: auto; font-size: 0.7rem; font-weight: 900; color: var(--muted-fg); white-space: nowrap; padding-right: 0.25rem; }

    /* ── BOTTOM SHEETS (calendar + city) ───────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 590; opacity: 0; pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(4px);
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-radius: 1.5rem 1.5rem 0 0;
      z-index: 600; max-height: 85vh; overflow-y: auto;
      transform: translateY(105%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 1.5rem);
      box-shadow: 0 -8px 32px rgba(0,0,0,.15);
    }
    .bottom-sheet.open { transform: translateY(0); }
    @media (min-width: 520px) {
      .bottom-sheet {
        top: 50%; left: 50%; bottom: auto; right: auto;
        width: 100%; max-width: 380px;
        transform: translate(-50%, 40px) scale(0.95);
        border-radius: 1.5rem;
        transition: transform .3s cubic-bezier(.32,.72,0,1), opacity .3s;
        opacity: 0; pointer-events: none;
        padding-bottom: 0.5rem;
      }
      .bottom-sheet.open {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1; pointer-events: auto;
      }
      .sheet-handle { display: none; }
    }
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0.75rem auto 0;
    }
    .sheet-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .sheet-head-title { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 9999px;
      border: 1.5px solid var(--border); background: var(--bg);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--muted-fg); transition: all .2s;
    }
    .sheet-close:hover { border-color: var(--primary); color: var(--primary); }

    /* Feedback */
    .fab-feedback{position:fixed;right:14px;bottom:84px;z-index:560;width:50px;height:50px;border-radius:9999px;border:none;background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.28);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .fab-feedback:active{transform:scale(.94)}
    .fb-form{display:flex;flex-direction:column;gap:.7rem;padding:1rem}
    .fb-tipos{display:flex;gap:.5rem}
    .fb-tipo{flex:1;padding:.55rem .25rem;border-radius:.75rem;border:1.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-weight:700;font-size:.82rem}
    .fb-tipo.sel{border-color:var(--primary);background:rgba(234,88,12,.08);color:var(--primary)}
    .fb-text{width:100%;min-height:96px;padding:.65rem;border-radius:.75rem;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font:inherit;resize:vertical}
    .fb-input{width:100%;padding:.65rem;border-radius:.75rem;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font:inherit}
    .fb-text:focus,.fb-input:focus{outline:none;border-color:var(--primary)}
    .fb-hp{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
    .fb-send{width:100%;padding:.8rem;border:none;border-radius:.75rem;background:var(--primary);color:#fff;font-family:'Baloo 2',cursive;font-weight:800;font-size:1rem;cursor:pointer}
    .fb-send:disabled{opacity:.6}
    .fb-note{font-size:.7rem;color:var(--muted-fg);text-align:center;margin:0}
    .fb-msg{text-align:center;padding:2rem 1.5rem;font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem}

    /* Calendar in sheet */
    .cal-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; padding: 0.75rem 1rem 0; }
    .cal-nav-btn { width: 40px; height: 40px; border-radius: 0.75rem; border: 1.5px solid var(--border); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: border-color .2s; }
    .cal-nav-btn:hover { border-color: var(--primary); }
    .cal-month-label { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 0 0.75rem 0.5rem; }
    .cal-dow { text-align: center; font-size: 0.65rem; font-weight: 900; color: var(--muted-fg); padding: 4px 0 6px; text-transform: uppercase; letter-spacing: .03em; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 700; border-radius: 0.625rem;
      cursor: pointer; transition: background .15s; min-height: 40px;
    }
    .cal-day:hover { background: var(--muted-bg); }
    .cal-day.has-ev { background: rgba(234,88,12,.15); color: var(--primary); font-weight: 900; }
    .cal-day.sel { background: var(--primary) !important; color: white; font-weight: 900; border-radius: 9999px; }
    .cal-day.other { opacity: .35; pointer-events: none; }
    .cal-day.empty { cursor: default; pointer-events: none; }

    /* City list in sheet */
    .city-sheet-list { padding: 1rem 1.25rem 1.5rem; display: grid; gap: 0.625rem; grid-template-columns: 1fr 1fr; }
    .city-sheet-item {
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 0.75rem 0.5rem; cursor: pointer;
      font-size: 0.85rem; font-weight: 800; border-radius: 0.75rem;
      border: 1.5px solid var(--border);
      transition: all .2s; color: var(--text); background: var(--bg);
    }
    .city-sheet-item:hover, .city-sheet-item:focus-visible { border-color: var(--primary); outline: none; }
    .city-sheet-item.sel { color: white; background: var(--primary); border-color: var(--primary); box-shadow: 0 4px 12px rgba(234,88,12,.2); }
    .city-check { display: none; }

    /* ── SECTION HEADING ────────────────────────────────────── */
    .section { padding: 1.25rem 0; }
    .sec-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.875rem; }
    .sec-title { font-family: 'Baloo 2', cursive; font-weight: 900; font-size: 1.1rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.2rem;
      padding: 0.1rem 0.5rem; border-radius: 9999px;
      font-size: 0.65rem; font-weight: 900; letter-spacing: .02em;
    }
    .badge-muted { background: var(--muted-bg); color: var(--muted-fg); }
    .badge-destaque { background: var(--secondary); color: var(--dark); }
    .badge-hoje { background: var(--accent); color: white; }

    /* ── HOJE SECTION ───────────────────────────────────────── */
    .hoje-section {
      background: linear-gradient(135deg, var(--dark) 0%, #3D1506 100%);
      padding: 1.25rem 0 1.5rem;
      position: relative; overflow: hidden;
    }
    .hoje-section::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(245,158,11,.03) 40px, rgba(245,158,11,.03) 80px);
      pointer-events: none;
    }
    .hoje-eyebrow {
      font-size: 0.65rem; font-weight: 900; letter-spacing: .14em;
      text-transform: uppercase; color: var(--secondary); margin-bottom: 0.375rem;
      display: flex; align-items: center; gap: 0.375rem;
    }
    .hoje-title {
      font-family: 'Baloo 2', cursive; font-weight: 900;
      font-size: 1.5rem; color: white; margin-bottom: 1rem; line-height: 1.1;
    }
    .hoje-cards { display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 0.25rem; scrollbar-width: none; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .hoje-cards::-webkit-scrollbar { display: none; }

    /* Hoje event card */
    .hoje-card {
      flex-shrink: 0; width: 220px; scroll-snap-align: start;
      background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.12);
      border-radius: var(--radius); padding: 1rem;
      cursor: pointer; transition: background .2s, transform .2s, border-color .2s;
      position: relative; overflow: hidden;
    }
    .hoje-card:hover { background: rgba(255,255,255,.14); border-color: var(--secondary); transform: translateY(-2px); }
    .hoje-card .destaque-glow {
      position: absolute; top: 0; right: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, rgba(245,158,11,.35), transparent 70%);
      pointer-events: none;
    }
    .hoje-card-time {
      font-size: 0.7rem; font-weight: 900; letter-spacing: .06em;
      color: var(--secondary); margin-bottom: 0.375rem; text-transform: uppercase;
    }
    .hoje-card-name { font-family: 'Baloo 2', cursive; font-weight: 900; font-size: 0.95rem; color: white; line-height: 1.2; margin-bottom: 0.5rem; }
    .hoje-card-city { font-size: 0.7rem; color: rgba(255,255,255,.5); display: flex; align-items: center; gap: 0.25rem; }
    .hoje-card-artists { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.5rem; }
    .artist-pill { font-size: 0.6rem; font-weight: 800; background: rgba(234,88,12,.25); color: #FCA572; padding: 0.15rem 0.5rem; border-radius: 9999px; }

    /* ── EVENT CARDS (main list) ────────────────────────────── */
    .events-grid { display: grid; gap: 0.625rem; }
    @media (min-width: 520px) { .events-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 900px) { .events-grid { grid-template-columns: 1fr 1fr 1fr; } }

    .ev-card {
      background: var(--card); border-radius: var(--radius);
      border: 1.5px solid var(--border);

const getEvento   = slug => eventos.find(e=>e.slug===slug);

const getArtistas = ev   => [...ev.artistas].sort((a,b)=>a.ordem-b.ordem).map(a=>getArtista(a.slug)?.nome).filter(Boolean);
const eventosByCidade = slug => eventos.filter(e=>e.cidadeSlug===slug).sort((a,b)=>a.data.localeCompare(b.data)||a.horario.localeCompare(b.horario));
const eventosByArtista= slug => eventos.filter(e=>e.artistas.some(a=>a.slug===slug));
const datasOf     = slug => [...new Set(eventosByCidade(slug).map(e=>e.data))].sort();
const eventosHoje = () => eventos.filter(e=>e.data===HOJE);
// Eventos da próxima data com programação (para quando "hoje" estiver vazio)
const proximosEventos = () => {
  const fut = eventos.filter(e=>e.data>HOJE).sort((a,b)=>a.data.localeCompare(b.data)||a.horario.localeCompare(b.horario));
  return fut.length ? fut.filter(e=>e.data===fut[0].data) : [];
};

/* ═══════════════════════════════════════════════════════════
   BANDEIRINHAS SVG
═══════════════════════════════════════════════════════════ */
function bandeirinhas(width = 2000) {
  const colors = ['#DC2626','#F59E0B','#16A34A','#2563EB','#7C3AED','#EA580C','#EC4899','#0891B2'];
  const FW = 30, FH = 20;
  const n = Math.ceil(width / FW) + 2;
  const total = n * FW;
  let d = `<line x1="0" y1="3" x2="${total}" y2="3" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>`;
  for(let i=0;i<n;i++){
    const x=i*FW; const c=colors[i%colors.length];
    d+=`<polygon points="${x+1},0 ${x+FW-1},0 ${x+FW/2},${FH}" fill="${c}" opacity=".9"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${total}" height="${FH}" style="display:block;width:100%;height:${FH}px" preserveAspectRatio="none">${d}</svg>`;
}

  if(ev.id.startsWith('aj')) return 'arraia-do-povo';

  return null;

function getRoute() {
  const h = location.hash.replace('#','') || '/';
  if(h==='/') return {page:'home'};
  let m;
  if((m=h.match(/^\/cidade\/(.+)/))) return {page:'cidade',slug:m[1]};
  if((m=h.match(/^\/evento\/(.+)/))) return {page:'evento',slug:m[1]};
  if((m=h.match(/^\/artista\/(.+)/))) return {page:'artista',slug:m[1]};
  if(h==='/cidades') return {page:'cidades'};
  return {page:'home'};
}

function render() {

  const _rk = route.page + (route.slug ? '/' + route.slug : '');
  if(_rk !== _lastTrackedRoute){
    _lastTrackedRoute = _rk;
    if(route.page==='cidade')       track('cidade_vista',  { cidade:  route.slug });
    else if(route.page==='evento')  track('evento_visto',  { evento:  route.slug });
    else if(route.page==='artista') track('artista_visto', { artista: route.slug });
  }
  const root = document.getElementById('root');

  // Update bottom nav tab from route
  if(route.page==='cidades') S.tab='cidades';
  else if(route.page==='home') {/* keep as is */}

  const hoje = eventosHoje();

  root.innerHTML = `
    ${renderHeader()}
    <main id="page-content" class="page-enter">
      ${renderPage(route)}
    </main>
    ${renderBottomNav(route, hoje.length)}
    ${renderSearchOverlay()}

}

    </div>`;
  } else {
    const evts = eventos.filter(e=>e.nome.toLowerCase().includes(q));
    const arts = artistas.filter(a=>a.nome.toLowerCase().includes(q));
    const cids = cidades.filter(c=>c.nome.toLowerCase().includes(q));
    const any = evts.length||arts.length||cids.length;

    if(!any) resultsHtml = `<div class="search-empty">Nenhum resultado para <strong>"${esc(S.searchQ)}"</strong></div>`;
    else {
      if(cids.length) resultsHtml += `<div class="search-section-title">Cidades</div><div>${cids.map(c=>`<span class="search-tag" data-goto="/cidade/${c.slug}">${ic.pinMd} ${esc(c.nome)}</span>`).join('')}</div>`;
      if(arts.length) resultsHtml += `<div class="search-section-title">Artistas</div><div>${arts.map(a=>`<span class="search-tag" data-goto="/artista/${a.slug}">${ic.music} ${esc(a.nome)}</span>`).join('')}</div>`;
      if(evts.length) {
        resultsHtml += `<div class="search-section-title">Eventos</div>`;
        resultsHtml += evts.map(e=>`
          <div class="search-event-card" data-goto="/evento/${e.slug}">
            <div class="search-event-name">${esc(e.nome)}</div>
            <div class="search-event-meta">${formatData(e.data)} · ${e.horario} · ${getCidade(e.cidadeSlug)?.nome||''}</div>
          </div>`).join('');
      }
    }
  }

  return `
  <div class="search-overlay ${S.searchOpen?'open':''}" role="dialog" aria-modal="true" aria-label="Busca">
    <div class="search-overlay-bar">
      <input class="search-overlay-input" id="searchInput" type="search" placeholder="Buscar artista, cidade, evento..." value="${esc(S.searchQ)}" autocomplete="off" />
      <button class="search-close" id="searchClose">Fechar</button>
    </div>
    <div class="search-results">${resultsHtml}</div>
  </div>`;
}

/* ── PAGE ROUTER ────────────────────────────────────────── */
function renderPage(route) {
  switch(route.page) {
    case 'home':    return renderHome();
    case 'cidades': return renderCidades();
    case 'cidade':  return renderCidade(route.slug);
    case 'evento':  return renderEvento(route.slug);
    case 'artista': return renderArtista(route.slug);
    default:        return renderHome();
  }
}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function renderHome() {
  const showHoje = S.tab === 'hoje';

  // Compute filtered events
  let filtered = [...eventos];
  if(showHoje) {
    filtered = filtered.filter(e=>e.data===HOJE);
  } else {
    if(S.dateFilter) filtered = filtered.filter(e=>e.data===S.dateFilter);
    else filtered = filtered.filter(e=>e.data>=HOJE); // padrão: do dia de hoje em diante (esconde eventos que já passaram)
    if(S.cityFilter!=='todas') filtered = filtered.filter(e=>e.cidadeSlug===S.cityFilter);
    if(S.festaFilter) filtered = filtered.filter(e=>getFestaSlug(e)===S.festaFilter);
  }
  filtered.sort((a,b)=>a.data.localeCompare(b.data)||a.horario.localeCompare(b.horario));

  // Group by date
  const byDate = {};
  filtered.forEach(e=>{ if(!byDate[e.data]) byDate[e.data]=[]; byDate[e.data].push(e); });
  const groups = Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b));

  const hoje = eventosHoje();
  const datasComEvento = new Set(eventos.map(e=>e.data));

  const showHeroHoje = !showHoje && hoje.length>0;

  return `
  <!-- HERO -->
  <section class="hero">
    <img class="hero-img" src="hero-banner-saojoao.png" alt="São João de Sergipe 2026"
      onerror="this.style.display='none';document.getElementById('hero-fb').style.display='block'" />
    <div id="hero-fb" style="display:none;height:240px;background:linear-gradient(135deg,#1C0A00,#3D1506)"></div>
    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">${ic.flame} Guia Oficial</p>
      <h1 class="hero-title">São João de Sergipe 2026</h1>
      <span class="hero-date-badge">${ic.calendar} 29 de maio até 12 de julho</span>
    </div>
  </section>

  <!-- HOJE SECTION (when not in "hoje" tab mode) -->
  ${showHeroHoje ? `
  <section class="hoje-section">
    <div class="container">
      <p class="hoje-eyebrow">
        <span class="pulse-dot" aria-hidden="true"></span>
        Acontecendo hoje
      </p>
      <h2 class="hoje-title">Programação de Hoje</h2>
      <div class="hoje-cards">
        ${hoje.map(e=>renderHojeCard(e)).join('')}
      </div>
    </div>
  </section>` : ''}

  <!-- FILTERS (only in "Eventos" tab) -->
  ${!showHoje ? `
  <div class="filter-strip">
    <div class="container">
      <div class="filter-inner">
        ${renderDateChip()}
        ${S.dateFilter ? `<button class="chip-x" id="clearDate" aria-label="Limpar filtro de data">${ic.x}</button>` : ''}
        ${renderCityChip()}
        ${renderFestaChip()}
        ${(S.dateFilter||S.cityFilter!=='todas'||S.festaFilter) ? `<span class="filter-count">${filtered.length} evento${filtered.length!==1?'s':''}</span>` : ''}
      </div>
    </div>
  </div>` : ''}

  <!-- EVENTS LIST -->
  <div class="container section">
    ${groups.length===0 ? (showHoje ? renderHojeVazio() : `
      <div class="empty-state">
        <div style="color:var(--primary)">${ic.flame}</div>
        <p>Nenhum evento com esses filtros.</p>
      </div>`) :
      groups.map(([data, evts])=>`
        <div class="date-group">
          <div class="date-heading">
            <span style="color:var(--primary)">${ic.calendar}</span>
            <span class="date-pill">${formatData(data)}</span>
            ${data===HOJE ? `<span class="badge badge-hoje">Hoje</span>` : ''}
            <span class="badge badge-muted">${evts.length} evento${evts.length>1?'s':''}</span>
          </div>
          <div class="events-grid">
            ${evts.map(e=>renderEvCard(e)).join('')}
          </div>
        </div>
      `).join('')
    }
  </div>

  <!-- EXPLORE CIDADES -->
  ${!showHoje ? `
  <section class="explore-section">
    <div class="container">
      <div class="explore-head-premium">
        <div class="explore-icon-wrapper">${ic.pinMd}</div>
        <h2 class="sec-title">Explore por Cidade</h2>
        <p class="explore-subtitle">Descubra a programação nos principais polos juninos de Sergipe</p>
      </div>
      <div class="cities-grid">
        ${cidades.map(c=>{
          const cnt = eventos.filter(e=>e.cidadeSlug===c.slug).length;
          if(!cnt) return '';
          return `<div class="city-card" onclick="go('/cidade/${c.slug}')" role="button" tabindex="0" aria-label="${esc(c.nome)}, ${cnt} eventos">
            <span class="city-icon">${ic.pinMd}</span>
            <span class="city-name">${esc(c.nome)}</span>
            <span class="city-count">${cnt} evento${cnt>1?'s':''}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </section>` : ''}

  <!-- REALIZAÇÃO / PATROCÍNIO -->
  <section class="realizacao-section">
    <div class="container">
      <p class="realizacao-label">Realização</p>
      <a class="realizacao-logo" href="https://valorimobiliaria.com.br/" target="_blank" rel="noopener" aria-label="VALOR — Centro de Soluções em Negócios Imobiliários">

function renderCalendar(datasComEvento) {
  const y=S.calYear, m=S.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  let cells = ['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEv=datasComEvento.has(ds), isSel=S.dateFilter===ds;
    cells+=`<div class="cal-day ${hasEv?'has-ev':''} ${isSel?'sel':''}" data-date="${ds}" role="button" tabindex="0" aria-label="${d} de ${MESES[m]}" ${isSel?'aria-pressed="true"':''}>${d}</div>`;
  }
  return `
  <div class="cal-nav-row">
    <button class="cal-nav-btn" id="calPrev" aria-label="Mês anterior">${ic.left}</button>
    <span class="cal-month-label">${MESES[m]} ${y}</span>
    <button class="cal-nav-btn" id="calNext" aria-label="Próximo mês">${ic.chev}</button>
  </div>
  <div class="cal-grid">${cells}</div>`;
}

/* ── Atualiza as bottom sheets no DOM ───────────────────── */
function updateSheets() {
  const datasComEvento = new Set(eventos.map(e=>e.data));
  const overlay    = q('#sheetOverlay');
  const calSheet   = q('#calSheet');
  const citySheet  = q('#citySheet');
  const festaSheet = q('#festaSheet');
  const fbSheet    = q('#fbSheet');
  if(!overlay || !calSheet || !citySheet || !festaSheet) return;

  const anyOpen = S.calOpen || S.citySheetOpen || S.festaSheetOpen || S.fbOpen;
  overlay.className    = 'sheet-overlay' + (anyOpen?' open':'');
  calSheet.className   = 'bottom-sheet' + (S.calOpen?' open':'');
  citySheet.className  = 'bottom-sheet' + (S.citySheetOpen?' open':'');
  festaSheet.className = 'bottom-sheet' + (S.festaSheetOpen?' open':'');
  if(fbSheet) fbSheet.className = 'bottom-sheet' + (S.fbOpen?' open':'');

  calSheet.innerHTML   = renderCalSheetContent(datasComEvento);
  citySheet.innerHTML  = renderCitySheetContent();
  festaSheet.innerHTML = renderFestaSheetContent();
  if(fbSheet) fbSheet.innerHTML = renderFbSheetContent();

  attachSheetEvents();
}

/* ── Eventos das bottom sheets ──────────────────────────── */
function attachSheetEvents() {
  // Fechar ao clicar no overlay
  q('#sheetOverlay')?.addEventListener('click',()=>{
    S.calOpen=false; S.citySheetOpen=false; S.festaSheetOpen=false; S.fbOpen=false; updateSheets(); updateFilterChips();
  });
  // Botões de fechar
  q('#calSheetClose')?.addEventListener('click',()=>{ S.calOpen=false; updateSheets(); updateFilterChips(); });
  q('#citySheetClose')?.addEventListener('click',()=>{ S.citySheetOpen=false; updateSheets(); updateFilterChips(); });
  q('#festaSheetClose')?.addEventListener('click',()=>{ S.festaSheetOpen=false; updateSheets(); updateFilterChips(); });
  // Feedback
  q('#fbSheetClose')?.addEventListener('click',()=>{ S.fbOpen=false; updateSheets(); });
  qq('#fbTipos .fb-tipo').forEach(b=>b.addEventListener('click',()=>{ S.fbTipo=b.dataset.tipo; qq('#fbTipos .fb-tipo').forEach(x=>x.classList.toggle('sel',x===b)); }));
  q('#fbForm')?.addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    if(q('#fbWebsite')?.value) return;                       // honeypot
    const msg = (q('#fbMensagem')?.value||'').trim();
    if(!msg){ q('#fbMensagem')?.focus(); return; }
    const btn = q('#fbSend'); if(btn){ btn.disabled=true; btn.textContent='Enviando...'; }
    const fd = new FormData();
    fd.append('token', FEEDBACK_TOKEN);
    fd.append('tipo', S.fbTipo);
    fd.append('mensagem', msg);
    fd.append('contato', (q('#fbContato')?.value||'').trim());
    fd.append('pagina', feedbackPagina());
    fd.append('dispositivo', navigator.userAgent);
    try{
      await fetch(FEEDBACK_ENDPOINT, { method:'POST', mode:'no-cors', body: fd });
      track('feedback_enviado', { tipo: S.fbTipo });
      const fb = q('#fbSheet'); if(fb) fb.innerHTML = `<div class="sheet-handle"></div><div class="fb-msg">Valeu! Recebemos seu feedback 🙌</div>`;
      setTimeout(()=>{ S.fbOpen=false; S.fbTipo='sugestao'; updateSheets(); }, 1800);
    }catch(_){
      if(btn){ btn.disabled=false; btn.textContent='Enviar'; }
      alert('Ops, não consegui enviar agora. Tenta de novo?');
    }
  });
  // Navegação de mês
  q('#calPrev')?.addEventListener('click',()=>{ S.calMonth--; if(S.calMonth<0){S.calMonth=11;S.calYear--;} updateSheets(); });
  q('#calNext')?.addEventListener('click',()=>{ S.calMonth++; if(S.calMonth>11){S.calMonth=0;S.calYear++;} updateSheets(); });
  // Selecionar dia
  qq('.cal-day[data-date]').forEach(el=>{
    el.addEventListener('click',()=>{ const d=el.dataset.date; S.dateFilter=S.dateFilter===d?null:d; S.calOpen=false; if(S.dateFilter) track('filtro_data',{data:S.dateFilter}); render(); });
  });
  // Selecionar cidade
  qq('.city-sheet-item[data-city]').forEach(el=>{
    el.addEventListener('click',()=>{ S.cityFilter=el.dataset.city; S.citySheetOpen=false; track('filtro_cidade',{cidade:el.dataset.city}); render(); });
  });
  // Selecionar festa
  qq('.city-sheet-item[data-festa]').forEach(el=>{
    el.addEventListener('click',()=>{
      const v = el.dataset.festa;
      S.festaFilter = v==='todas' ? null : v;
      S.festaSheetOpen=false; render();
    });
  });
}

/* ── Atualiza apenas os chips do filter strip ────────────── */
function updateFilterChips() {
  const dc = q('#dateChip');
  if(dc) {
    const label = S.dateFilter
      ? (()=>{ const [y,m,d]=S.dateFilter.split('-').map(Number); return `${d} de ${MESES[m-1]}`; })()
      : 'Escolher data';
    dc.className = 'chip' + (S.dateFilter?' on':'');
    dc.innerHTML = `${ic.calDays} ${label}`;
  }
  const cc = q('#cityChip');
  if(cc) {
    const nome = S.cityFilter==='todas' ? 'Todas as cidades' : (cidades.find(c=>c.slug===S.cityFilter)?.nome||'Todas as cidades');
    cc.className = 'chip' + (S.cityFilter!=='todas'?' on':'');
    cc.innerHTML = `${ic.pin} ${nome}`;
  }
  const fc = q('#festaChip');
  if(fc) {
    const nome = S.festaFilter ? (FESTAS.find(f=>f.slug===S.festaFilter)?.nome||'Todas as festas') : 'Todas as festas';
    fc.className = 'chip' + (S.festaFilter?' on':'');
    fc.innerHTML = `${ic.flameSm} ${nome}`;
  }
}

      ${cidades.map(c=>{
        const cnt = eventos.filter(e=>e.cidadeSlug===c.slug).length;
        return `<div class="city-card" onclick="go('/cidade/${c.slug}')" role="button" tabindex="0" aria-label="${esc(c.nome)}, ${cnt} eventos">
          <span class="city-icon">${ic.pinMd}</span>
          <span class="city-name">${esc(c.nome)}</span>
          <span class="city-count">${cnt||'Sem'} evento${cnt!==1?'s':''}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   CIDADE PAGE
═══════════════════════════════════════════════════════════ */
function renderCidade(slug) {
  const cidade = getCidade(slug);
  if(!cidade) return notFound('Cidade não encontrada.');

  const todos = eventosByCidade(slug);
  const datas = datasOf(slug);
  const sel = S.cityDates[slug] || null;
  const filtered = sel ? todos.filter(e=>e.data===sel) : todos;

  const byDate = {};
  filtered.forEach(e=>{ if(!byDate[e.data]) byDate[e.data]=[]; byDate[e.data].push(e); });
  const groups = Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b));

  const cnts = {};
  todos.forEach(e=>{ cnts[e.data]=(cnts[e.data]||0)+1; });

  return `
  <section class="page-hero">
    <button class="back-btn-light page-hero-back" onclick="history.back()" aria-label="Voltar">
      ${ic.left} Voltar
    </button>
    <h1 class="page-hero-title">${ic.pin} ${esc(cidade.nome)}</h1>
    <p class="page-hero-sub">${todos.length} evento${todos.length!==1?'s':''} programados</p>
  </section>

  <!-- DAY PILLS -->
  <div class="day-pills" id="dayPills" aria-label="Filtrar por data">
    <button class="day-pill ${!sel?'active':''}" data-day="" aria-pressed="${!sel}">
      <span class="dp-dow">Todos</span>
      <span class="dp-num" style="font-size:1rem">os dias</span>
    </button>
    ${datas.map(d=>{
      const {dia,dow}=formatDataCurta(d);
      const isHoje=d===HOJE;
      return `<button class="day-pill ${sel===d?'active':''}" data-day="${d}" aria-pressed="${sel===d}" aria-label="${dow} dia ${dia}${isHoje?' (hoje)':''}">
        <span class="dp-dow">${dow}${isHoje?' ·':''}</span>
        <span class="dp-num">${dia}</span>
        <span class="dp-cnt">${cnts[d]||0} evt</span>
      </button>`;
    }).join('')}
  </div>

  <!-- EVENTS -->
  <div class="container section" style="padding-bottom:2rem">
    ${groups.length===0 ? `
      <div class="empty-state">
        <div style="color:var(--primary)">${ic.flame}</div>
        <p>Nenhum evento nesta data.</p>
        <button class="back-btn" style="margin:0.875rem auto 0" onclick="S.cityDates['${slug}']=null;render()">Ver todos os dias</button>
      </div>` :
      groups.map(([data,evts])=>`
        <div class="date-group">
          <div class="date-sticky-header">
            ${formatData(data)} ${data===HOJE?'<span class="badge badge-hoje" style="margin-left:.5rem">Hoje</span>':''}
          </div>
          <div class="events-grid">
            ${evts.map(e=>renderEvCard(e)).join('')}
          </div>
        </div>
      `).join('')
    }
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   EVENTO PAGE
═══════════════════════════════════════════════════════════ */
function renderEvento(slug) {
  const e = getEvento(slug);
  if(!e) return notFound('Evento não encontrado.');

  const cidade = getCidade(e.cidadeSlug);
  const local  = getLocal(e.local);
  const lineup = [...e.artistas].sort((a,b)=>a.ordem-b.ordem).map(a=>({...a, art:getArtista(a.slug)}));

  const mapsUrl = local
    ? `https://www.google.com/maps/search/?api=1&query=${local.lat},${local.lng}`
    : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.local+' '+(cidade?.nome||'')+' Sergipe')}`;

  const waText = encodeURIComponent(`🎪 *${e.nome}*\n📅 ${formatData(e.data)} às ${e.horario}\n📍 ${e.local}${cidade?` — ${cidade.nome}`:''}\n\n_São João de Sergipe 2026_`);

  return `
  <div class="page-hero">
    <button class="back-btn-light page-hero-back" onclick="history.back()" aria-label="Voltar">
      ${ic.left} ${cidade?.nome||'Voltar'}
    </button>
    <h1 class="page-hero-title" style="font-size:clamp(1.1rem,4vw,1.75rem)">${esc(e.nome)}</h1>
  </div>

  <div class="container section" style="padding-bottom:2rem">
    <div class="ev-detail">
      <div class="ev-detail-card">
        <div class="ev-detail-hd">
          ${e.destaque?`<span class="badge badge-destaque" style="margin-bottom:.5rem">${ic.star} Destaque</span><br/>`:''}
          <h2 class="ev-detail-title">${esc(e.nome)}</h2>
        </div>
        <div class="ev-detail-body">
          <div style="display:flex;flex-direction:column;gap:.625rem">
            ${cidade?`<div class="info-row">${ic.pin} <span><strong>${esc(e.local)}</strong> — ${esc(cidade.nome)}</span></div>`:''}
            <div class="info-row">${ic.calendar} <span>${formatData(e.data)}</span></div>
            <div class="info-row">${ic.clock} <span>${e.horario}</span></div>
          </div>
          <hr class="divider"/>
          <div>
            <div class="sub-heading">Sobre o evento</div>
            <p class="descricao">${esc(e.descricao)}</p>
          </div>
          ${lineup.length?`
          <hr class="divider"/>
          <div>
            <div class="sub-heading">${ic.music} Line-up</div>
            <div class="lineup">
              ${lineup.map((a,i)=>`
                <div class="lineup-item" onclick="go('/artista/${a.slug}')" role="button" tabindex="0" aria-label="${a.art?.nome||a.slug}">
                  <span class="lineup-num">${i+1}º</span>
                  <span class="lineup-name">${esc(a.art?.nome||a.slug)}</span>
                  <span style="margin-left:auto;color:var(--muted-fg)">${ic.chev}</span>
                </div>`).join('')}
            </div>
          </div>`:''}
          <hr class="divider"/>
          <div class="actions-row">
            <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" onclick="track('maps_click',{evento:'${e.slug}'})" style="flex:1;min-width:120px;display:block">
              <button class="btn-action btn-maps" style="width:100%" aria-label="Abrir localização no Google Maps">
                ${ic.external} Como chegar
              </button>
            </a>
            <a href="https://api.whatsapp.com/send?text=${waText}" target="_blank" rel="noopener noreferrer" onclick="track('whatsapp_share',{evento:'${e.slug}'})" style="flex:1;min-width:120px;display:block">
              <button class="btn-action btn-whatsapp" style="width:100%" aria-label="Compartilhar no WhatsApp">
                ${ic.whatsapp} WhatsApp
              </button>
            </a>
            <button class="btn-action btn-share" id="shareNative" aria-label="Compartilhar" style="flex:0 0 auto;min-width:52px">
              ${ic.share}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   ARTISTA PAGE
═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   EVENTS & INTERACTIONS
═══════════════════════════════════════════════════════════ */
function attachDragToScroll() {
  const sliders = document.querySelectorAll('.day-pills, .filter-inner, .hoje-cards');
  sliders.forEach(slider => {
    let isDown = false, startX, scrollLeft, dragged = false;
    slider.style.cursor = 'grab';
    
    slider.addEventListener('mousedown', (e) => {
      isDown = true; dragged = false;
      slider.style.cursor = 'grabbing';
      startX = e.pageX - slider.offsetLeft;
      scrollLeft = slider.scrollLeft;
    });
    slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'grab'; });
    slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
    slider.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - slider.offsetLeft;
      const walk = (x - startX) * 2;
      if (Math.abs(walk) > 5) dragged = true;
      slider.scrollLeft = scrollLeft - walk;
    });
    slider.addEventListener('click', (e) => {
      if (dragged) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);
  });
}

function attachAll(route) {
  // ── HEADER SEARCH ──
  q('#hSearchBtn')?.addEventListener('click',()=>{ S.searchOpen=true; render(); setTimeout(()=>q('#searchInput')?.focus(),50); });

  // ── SEARCH OVERLAY ──
  const si = q('#searchInput');
  if(si) {
    si.addEventListener('input', e=>{ S.searchQ=e.target.value; renderSearchPartial(); si.focus();
      clearTimeout(_buscaTimer); _buscaTimer=setTimeout(()=>{ const t=S.searchQ.trim().toLowerCase(); if(t.length>=2) track('busca',{termo:t}); }, 1200); });
    si.addEventListener('keydown', e=>{ if(e.key==='Escape'){ S.searchOpen=false; S.searchQ=''; render(); } });
  }
  q('#searchClose')?.addEventListener('click',()=>{ S.searchOpen=false; S.searchQ=''; render(); });

  // Search results navigation
  qq('[data-goto]').forEach(el=>{
    el.addEventListener('click',()=>{ S.searchOpen=false; S.searchQ=''; go(el.dataset.goto); });
  });

  // ── BOTTOM NAV ──
  q('#bnav-home')?.addEventListener('click',()=>{ S.tab='home'; S.dateFilter=null; S.cityFilter='todas'; go('/'); render(); });
  q('#bnav-hoje')?.addEventListener('click',()=>{ S.tab='hoje'; go('/'); render(); });
  q('#fabFeedback')?.addEventListener('click',()=>{ S.fbOpen=true; updateSheets(); track('feedback_aberto',{pagina:location.hash||'/'}); setTimeout(()=>q('#fbMensagem')?.focus(),350); });
  q('#bnav-cidades')?.addEventListener('click',()=>{ S.tab='cidades'; go('/cidades'); });
  q('#bnav-buscar')?.addEventListener('click',()=>{ S.searchOpen=true; render(); setTimeout(()=>q('#searchInput')?.focus(),50); });

  // ── FILTER STRIP ──
  q('#dateChip')?.addEventListener('click',()=>{ S.calOpen=true; S.citySheetOpen=false; S.festaSheetOpen=false; updateSheets(); });
  q('#cityChip')?.addEventListener('click',()=>{ S.citySheetOpen=true; S.calOpen=false; S.festaSheetOpen=false; updateSheets(); });
  q('#festaChip')?.addEventListener('click',()=>{ S.festaSheetOpen=true; S.calOpen=false; S.citySheetOpen=false; updateSheets(); });
  q('#clearDate')?.addEventListener('click',()=>{ S.dateFilter=null; render(); });

  // ── DAY PILLS (cidade page) ──
  if(route.page==='cidade') {
    qq('.day-pill[data-day]').forEach(btn=>{
      btn.addEventListener('click',()=>{ S.cityDates[route.slug]=btn.dataset.day||null; render(); });
    });
  }

  // ── SHARE (evento page) ──
  q('#shareNative')?.addEventListener('click',()=>{
    const e = getEvento(route.slug);
    if(!e) return;
    track('share_nativo', { evento: e.slug });
    if(navigator.share) navigator.share({title:e.nome, url:location.href});
    else navigator.clipboard?.writeText(location.href).then(()=>alert('Link copiado!'));
  });

  // ── Keyboard nav for role=button divs ──
  qq('[role="button"]').forEach(el=>{
    if(el.tagName!=='BUTTON' && el.tagName!=='A') {
      el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); el.click(); } });
    }
  });

  attachDragToScroll();
  window.scrollTo(0,0);
}

/* ── Partial re-renders (no full render) ────────────────── */
// renderFilterStrip mantida como stub — chips agora são estáticos no render()
// A atualização dos filtros ocorre via render() completo.

function renderSearchPartial() {
  const overlay = q('.search-overlay');
  if(!overlay) return;
  const oldResults = overlay.querySelector('.search-results');
  if(!oldResults) return;

  const q2 = S.searchQ.trim().toLowerCase();
  let html = '';

  if(!q2) {
    html = `<div class="search-placeholder"><div>${ic.search}</div><p>Pesquise por artistas, cidades ou eventos</p></div>`;
  } else {
    const evts = eventos.filter(e=>e.nome.toLowerCase().includes(q2));
    const arts = artistas.filter(a=>a.nome.toLowerCase().includes(q2));
    const cids = cidades.filter(c=>c.nome.toLowerCase().includes(q2));
    const any = evts.length||arts.length||cids.length;
    if(!any) html = `<div class="search-empty">Nenhum resultado para <strong>"${esc(S.searchQ)}"</strong></div>`;
    else {
      if(cids.length) html += `<div class="search-section-title">Cidades</div><div>${cids.map(c=>`<span class="search-tag" data-goto="/cidade/${c.slug}">${ic.pinMd} ${esc(c.nome)}</span>`).join('')}</div>`;
      if(arts.length) html += `<div class="search-section-title">Artistas</div><div>${arts.map(a=>`<span class="search-tag" data-goto="/artista/${a.slug}">${ic.music} ${esc(a.nome)}</span>`).join('')}</div>`;
      if(evts.length) {
        html += `<div class="search-section-title">Eventos</div>`;
        html += evts.map(e=>`<div class="search-event-card" data-goto="/evento/${e.slug}"><div class="search-event-name">${esc(e.nome)}</div><div class="search-event-meta">${formatData(e.data)} · ${e.horario} · ${getCidade(e.cidadeSlug)?.nome||''}</div></div>`).join('');
      }
    }
  }
  oldResults.innerHTML = html;
  qq('[data-goto]').forEach(el=>{ el.addEventListener('click',()=>{ S.searchOpen=false; S.searchQ=''; go(el.dataset.goto); }); });
}
